# Upptime configuration for Moov In Checklist
# Copy this file to the ROOT of your new Upptime repo (created from
# https://github.com/upptime/upptime via "Use this template").
#
# After committing, GitHub Actions will start running checks every ~5 min
# and publish the status page to GitHub Pages.

owner: iamjmnly
repo: moov-status

sites:
  - name: Homepage
    url: https://themoveinchecklist.com
  - name: Auth
    url: https://themoveinchecklist.com/auth
  - name: Pricing
    url: https://themoveinchecklist.com/pricing
  - name: Support
    url: https://themoveinchecklist.com/support
  - name: Payments webhook
    url: https://themoveinchecklist.com/api/public/payments/webhook
    method: GET
    # Webhook only accepts signed POSTs; treat 401/405 as "up".
    expectedStatusCodes:
      - 200
      - 401
      - 405

status-website:
  cname: status.themoveinchecklist.com   # remove this line if not using a custom subdomain
  name: Moov In Checklist Status
  introTitle: "Moov In Checklist Status"
  introMessage: "Live uptime and response-time monitoring for themoveinchecklist.com."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/YOUR_GITHUB_USERNAME/moov-status

assignees:
  - iamjmnly

# Open a GitHub issue automatically when a site goes down
notifications: []
